<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Push/Pull Tracker — Bakr</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--s1:#0d1120;--s2:#131a2e;--s3:#1a2340;--s4:#202b4d;
  --border:#252f4a;--border2:#2e3a5c;
  --text:#dce5f5;--muted:#5a6b8a;--sub:#8a9cc0;
  --push:#f97316;--push-d:#7c3810;--push-l:#fed7aa;
  --pull:#38bdf8;--pull-d:#0c4a6e;--pull-l:#bae6fd;
  --core:#a78bfa;--core-d:#4c1d95;--core-l:#ede9fe;
  --legs:#4ade80;--legs-d:#14532d;--legs-l:#dcfce7;
  --good:#22c55e;--warn:#f59e0b;--bad:#ef4444;
  --accent:#38bdf8;
  --font-d:'Oswald',sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --font-b:'Rubik',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;padding-bottom:72px}
#app{max-width:680px;margin:0 auto;width:100%;padding:0 12px}
h1,h2,h3{font-family:var(--font-d);letter-spacing:.5px}
.mono{font-family:var(--font-m)}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;max-width:680px;margin:0 auto;left:50%;transform:translateX(-50%)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 8px;background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:9px;cursor:pointer;gap:3px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:18px;height:18px}
.header{padding:16px 4px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:16px}
.header-title{font-family:var(--font-d);font-size:22px;font-weight:700;letter-spacing:1px}
.header-title span{color:var(--accent)}
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.stat-card .val{font-family:var(--font-m);font-size:22px;font-weight:600;line-height:1}
.stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.badge{display:inline-block;font-size:10px;font-weight:600;font-family:var(--font-d);letter-spacing:.8px;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.badge-push{background:var(--push-d);color:var(--push-l)}
.badge-pull{background:var(--pull-d);color:var(--pull-l)}
.badge-core{background:var(--core-d);color:var(--core-l)}
.badge-legs{background:var(--legs-d);color:var(--legs-l)}
.badge-main{background:var(--s3);color:var(--sub)}
.badge-good{background:#14532d;color:#86efac}
.badge-warn{background:#451a03;color:#fcd34d}
.badge-skill{background:#1e1b4b;color:#a5b4fc}
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.hero{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.hero.push::before{background:var(--push)}
.hero.pull::before{background:var(--pull)}
.hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.hero-name{font-family:var(--font-d);font-size:32px;font-weight:700;line-height:1;margin-bottom:4px}
.hero-sub{font-size:14px;color:var(--sub);margin-bottom:16px}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.hero-exercises{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:16px}
.hero-ex{background:var(--s3);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--sub)}
.hero-ex strong{display:block;color:var(--text);font-size:11px;margin-bottom:1px;font-family:var(--font-d);font-weight:600;letter-spacing:.3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:8px;border:none;font-family:var(--font-d);font-size:16px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-primary{background:var(--accent);color:#00090f;width:100%}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--s3);color:var(--text);border:1px solid var(--border2)}
.btn-danger{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.btn-sm{padding:8px 14px;font-size:13px}
.session-header{background:var(--s2);border-bottom:1px solid var(--border);padding:14px;border-radius:10px 10px 0 0;position:sticky;top:0;z-index:10;margin-bottom:12px}
.progress-bar-wrap{background:var(--s3);border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .3s;background:var(--accent)}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.ex-card.done{opacity:.6}
.ex-name{font-family:var(--font-d);font-size:17px;font-weight:600;letter-spacing:.3px;margin-bottom:2px}
.ex-target{font-size:12px;color:var(--muted);margin-bottom:10px}
.sets-row{display:flex;gap:8px;flex-wrap:wrap}
.set-input-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.set-num{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.set-input{width:56px;height:52px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-family:var(--font-m);font-size:22px;font-weight:600;text-align:center;-moz-appearance:textfield;appearance:textfield;transition:border-color .15s}
.set-input:focus{outline:none;border-color:var(--accent)}
.set-input::-webkit-inner-spin-button,.set-input::-webkit-outer-spin-button{-webkit-appearance:none}
.set-input.good{border-color:var(--good);color:var(--good)}
.set-input.warn{border-color:var(--warn);color:var(--warn)}
.set-input.bad{border-color:var(--bad);color:var(--bad)}
.single-check{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;margin-bottom:12px;transition:border-color .15s}
.single-check.checked{border-color:var(--good)}
.single-check .cb{width:22px;height:22px;border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px;color:#000}
.single-check.checked .cb{background:var(--good);border-color:var(--good)}
.single-check label{font-size:14px;color:var(--sub);cursor:pointer;font-weight:500}
.single-check.checked label{color:var(--muted)}
.hist-item{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.hist-item:hover{border-color:var(--border2)}
.hi-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hi-name{font-family:var(--font-d);font-size:15px;font-weight:600;letter-spacing:.3px}
.hi-date{font-size:11px;color:var(--muted);font-family:var(--font-m)}
.hi-sets{font-size:12px;color:var(--muted)}
.hist-expand{background:var(--s2);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:12px 14px;margin-top:-8px;margin-bottom:8px;display:none}
.hist-expand.open{display:block}
.hist-ex-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.hist-ex-row:last-child{border:none}
.hist-ex-row .hn{color:var(--sub)}
.hist-ex-row .hv{font-family:var(--font-m);color:var(--text)}
.prog-ex{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.prog-ex-name{font-size:13px;font-weight:600;margin-bottom:8px}
.prog-bars{display:flex;gap:3px;align-items:flex-end;height:50px}
.prog-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.prog-bar-bg{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.prog-bar-val{font-size:9px;font-family:var(--font-m);color:var(--muted)}
.prog-bar-date{font-size:8px;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);height:28px}
.plan-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.plan-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.plan-card.open .plan-card-header{border-bottom:1px solid var(--border)}
.plan-title{font-family:var(--font-d);font-size:18px;font-weight:700;letter-spacing:.5px;margin-bottom:3px}
.plan-sub{font-size:12px;color:var(--muted);margin-bottom:5px}
.plan-meta{display:flex;gap:6px;flex-wrap:wrap}
.plan-body{display:none;padding:12px 16px 16px}
.plan-card.open .plan-body{display:block}
.plan-section-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;font-family:var(--font-d)}
.plan-ex-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.plan-ex-row:last-child{border:none}
.plan-ex-name{color:var(--text);flex:1}
.plan-ex-note{font-size:11px;color:var(--muted);margin-top:1px}
.plan-ex-target{font-family:var(--font-m);color:var(--accent);flex-shrink:0;font-size:11px;white-space:nowrap}
.time-badge{display:inline-flex;align-items:center;background:var(--s3);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--sub);font-family:var(--font-m)}
.protein-hero{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:16px}
.protein-today{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.pval{font-family:var(--font-m);font-size:48px;font-weight:600}
.ptgt{font-size:16px;color:var(--muted)}
.protein-bar-wrap{background:var(--s3);border-radius:6px;height:10px;margin:10px 0}
.protein-bar{border-radius:6px;height:100%;transition:width .4s}
.p-input-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.p-input-row input[type=number]{width:90px;height:44px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-family:var(--font-m);font-size:20px;padding:0 10px;text-align:center;-moz-appearance:textfield;appearance:textfield}
.p-input-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.p-input-row input[type=number]:focus{outline:none;border-color:var(--accent)}
.p-input-row input[type=text]{flex:1;height:44px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-family:var(--font-b);font-size:14px;padding:0 12px}
.p-input-row input[type=text]:focus{outline:none;border-color:var(--accent)}
.protein-entry-list{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.protein-entry{display:flex;align-items:center;gap:8px;background:var(--s3);border-radius:6px;padding:7px 10px;font-size:12px}
.pe-time{color:var(--muted);font-family:var(--font-m);font-size:10px;min-width:36px}
.pe-src{color:var(--sub);flex:1}
.pe-g{font-family:var(--font-m);font-weight:600;color:var(--accent);min-width:36px;text-align:right}
.pe-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0}
.pe-del:hover{color:var(--bad)}
.protein-hist-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 12px;background:var(--s2);border-radius:6px;margin-bottom:6px}
.pdate{color:var(--muted);font-family:var(--font-m);font-size:11px}
.pamount{font-family:var(--font-m);font-weight:600}
.ai-card{background:linear-gradient(135deg,#0d1a2e,#0a1020);border:1px solid var(--pull-d);border-radius:10px;padding:16px;margin-bottom:12px}
.ai-targets{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.ai-target-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 8px;background:var(--s3);border-radius:5px}
.ai-target-row .ex-lbl{color:var(--sub)}
.ai-target-row .ex-val{font-family:var(--font-m);color:var(--accent);font-weight:600}
.ai-note{font-size:13px;color:var(--text);font-style:italic;border-top:1px solid var(--border);padding-top:10px;margin-top:6px;line-height:1.6}
.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;font-family:var(--font-d)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty .big{font-family:var(--font-d);font-size:32px;margin-bottom:8px;color:var(--s4)}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">PUSH<span>/</span>PULL</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:11px;color:var(--muted);font-family:var(--font-m)" id="hdr-date"></div>
      <button onclick="go('data')" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:4px 8px;font-size:11px;font-family:var(--font-d);letter-spacing:.5px;transition:color .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">DATA</button>
    </div>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
  <div id="view"></div>
</div>

<nav id="nav">
  <button class="nav-btn active" onclick="go('dashboard')" data-view="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" onclick="go('train')" data-view="train">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <span>Train</span>
  </button>
  <button class="nav-btn" onclick="go('plans')" data-view="plans">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span>Plans</span>
  </button>
  <button class="nav-btn" onclick="go('history')" data-view="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>History</span>
  </button>
  <button class="nav-btn" onclick="go('progress')" data-view="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Progress</span>
  </button>
  <button class="nav-btn" onclick="go('protein')" data-view="protein">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    <span>Protein</span>
  </button>
</nav>

<script>

// ─── V-TAPER PROGRAM · 6-SESSION CYCLE · 42 MIN CAP ─────────────────────────
// Expert-reviewed. Side delts + lats are V-taper priority muscles.
// Left-side correction: SA Row leads with left in every Pull session.
// Progressive overload: AI coach generates targets after each completed session.
// ─────────────────────────────────────────────────────────────────────────────
const SESS=[

  // SESSION 1 · PUSH A · Chest + Shoulders · Strength
  {
    id:'pushA',
    name:'Push A',
    sub:'Chest + Shoulders · Strength',
    type:'push',
    est:'42',
    sec:'core',
    ex:[
      {id:'dips',            lbl:'Ring Dips',                s:3, mn:8,  mx:10, u:'reps',
       note:'90s rest — chest + tricep compound'},
      {id:'pike_push',       lbl:'Pike Pushups',             s:3, mn:8,  mx:10, u:'reps',
       note:'90s rest — shoulder compound, elbows track forward'},
      {id:'lat_raise',       lbl:'Band Lateral Raises',      s:3, mn:15, mx:15, u:'reps',
       note:'60s rest — elbow-led, no shrugging, strict form'},
      {id:'pseudo_planche',  lbl:'Pseudo Planche Pushup',    s:2, mn:8,  mx:10, u:'reps',
       note:'Hands by lower ribs, fingers back, lean weight forward — upper chest fires hard'},
      {id:'y_raise',         lbl:'Band Y-Raise',             s:2, mn:12, mx:12, u:'reps',
       note:'60s rest — scapular health, control the return'},
      {id:'ab_wheel',        lbl:'Ab Wheel Rollout',         s:3, mn:8,  mx:10, u:'reps',
       cat:'core', note:'75s rest — brace hard before rolling'},
      {id:'stomach_vac',     lbl:'Stomach Vacuum',           s:3, mn:20, mx:20, u:'sec',
       cat:'core', note:'Exhale fully — draw navel to spine — hold. Narrows waist over time'},
    ]
  },

  // SESSION 2 · PULL A · Lat Width + Legs · Strength
  {
    id:'pullA',
    name:'Pull A',
    sub:'Lat Width + Legs · Strength',
    type:'pull',
    est:'42',
    sec:'legs',
    ex:[
      {id:'wide_pullup',        lbl:'Wide-Grip Pullups',          s:3, mn:6,  mx:8,  u:'reps',
       note:'90s rest — widest comfortable grip, dead hang each rep, V-taper priority'},
      {id:'sa_row',             lbl:'SA Ring Row',                s:3, mn:8,  mx:8,  u:'reps/side',
       note:'75s rest — LEAD WITH LEFT, match right exactly, never let right exceed'},
      {id:'straight_pulldown',  lbl:'Band Straight-Arm Pulldown', s:3, mn:12, mx:12, u:'reps',
       note:'60s rest — hinge at hip, arms straight, drive hands to hips, feel lower lat flare'},
      {id:'face_pull',          lbl:'Face Pulls (band)',          s:3, mn:15, mx:15, u:'reps',
       note:'60s rest — rear delt, elbows high and wide'},
      {id:'bulgarian',          lbl:'Bulgarian Split Squat',      s:3, mn:8,  mx:10, u:'reps/side',
       cat:'legs', note:'90s rest — full depth, rear foot on ring, strength focus'},
      {id:'sl_rdl',             lbl:'SL Romanian Deadlift',       s:3, mn:10, mx:10, u:'reps/side',
       cat:'legs', note:'75s rest — hinge not squat, feel hamstring load at top'},
      {id:'calf_raise',         lbl:'SL Calf Raise (step)',       s:2, mn:15, mx:15, u:'reps/side',
       cat:'legs', note:'Do between SL-RDL sets — step edge, full range, slow descent'},
    ]
  },

  // SESSION 3 · PUSH B · Shoulders + Upper Chest · Volume
  // Most important Push session for V-taper. Protect this slot.
  {
    id:'pushB',
    name:'Push B',
    sub:'Shoulders + Upper Chest · Volume',
    type:'push',
    est:'42',
    sec:'core',
    ex:[
      {id:'pike_push',        lbl:'Pike Pushups',            s:3, mn:10, mx:12, u:'reps',
       note:'90s rest — compound first, full range, progress toward HSPU'},
      {id:'lat_raise',        lbl:'Band Lateral Raises',     s:4, mn:15, mx:20, u:'reps',
       note:'60s rest — LIGHTER band than S1, pump focus, this is the V-taper engine'},
      {id:'rev_fly',          lbl:'Band Reverse Flyes',      s:3, mn:15, mx:15, u:'reps',
       note:'60s rest — rear delt width, pinch at end range'},
      {id:'pseudo_planche',   lbl:'Pseudo Planche Pushup',   s:3, mn:10, mx:10, u:'reps',
       note:'75s rest — upper chest, hands by lower ribs, consistent lean angle'},
      {id:'band_incline_fly', lbl:'Band Incline Fly',        s:2, mn:12, mx:12, u:'reps',
       note:'60s rest — band anchored low, press upward and across at 45°, stretch at bottom'},
      {id:'side_plank',       lbl:'Side Plank',              s:2, mn:30, mx:30, u:'sec/side',
       cat:'core', note:'Superset with stomach vacuum below'},
      {id:'stomach_vac',      lbl:'Stomach Vacuum',          s:2, mn:20, mx:20, u:'sec',
       cat:'core', note:'Superset immediately after side plank — exhale fully, draw navel in'},
    ]
  },

  // SESSION 4 · PULL B · Lat Volume + Legs
  {
    id:'pullB',
    name:'Pull B',

const DB={
  async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null}return JSON.parse(localStorage.getItem(k))}catch{return null}},
  async set(k,v){const s=JSON.stringify(v);try{if(window.storage){await window.storage.set(k,s);return}localStorage.setItem(k,s)}catch(e){console.warn(e)}}
};

function go(view){
  if(ST.active&&view!=='train'){if(!confirm('Active session — leave?'))return;ST.active=null;}
  ST.view=view;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  render();
}

function render(){
  const v=document.getElementById('view');
  if(ST.view==='dashboard')v.innerHTML=renderDash();
  else if(ST.view==='train')v.innerHTML=renderTrain();
  else if(ST.view==='plans')v.innerHTML=renderPlans();
  else if(ST.view==='history')v.innerHTML=renderHist();
  else if(ST.view==='progress')v.innerHTML=renderProg();
  else if(ST.view==='protein')v.innerHTML=renderProtein();
  else if(ST.view==='data')v.innerHTML=renderData();
}

function renderActive(){
  const s=ST.active;
  const def=SESS.find(x=>x.id===s.defId);
  const total=s.ex.reduce((sum,e)=>sum+e.s,0);
  const done=s.ex.reduce((sum,e)=>sum+e.logged.filter(v=>v!==null).length,0);
  const pct=total>0?Math.round(done/total*100):0;
  const mainEx=s.ex.filter(e=>!e.cat||e.cat==='main');
  const secEx=s.ex.filter(e=>e.cat&&e.cat!=='main');
  const secLabel=def.sec==='legs'?'Leg block':def.sec==='core'?'Core block':null;
  const secCol=def.sec==='legs'?'var(--legs)':def.sec==='core'?'var(--core)':'var(--sub)';
  return`
  <div class="session-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="mono" style="font-size:13px;font-weight:600">${def.name}</span>
      <div class="mono" style="font-size:12px;color:var(--muted)" id="set-counter">${done}/${total} sets</div>
    </div>

  </div>

  ${mainEx.map(e=>exCard(e,def)).join('')}

    <button class="btn btn-primary" onclick="finish()" style="flex:1">Complete Session</button>
  </div>`;
}

function exCard(e,def){
  const defEx=def.ex.find(x=>x.id===e.id)||e;
  const rec=ST.recs[def.id];
  const rt=rec&&rec.next_targets&&rec.next_targets[e.id];
  const tMn=rt?rt.min:defEx.mn;const tMx=rt?rt.max:defEx.mx;
  const done=e.logged.every(v=>v!==null);
  const note=(rt&&rt.note)||defEx.note||'';
  const catBadge=e.cat&&e.cat!=='main'?`<span class="badge badge-${e.cat}" style="margin-left:4px">${e.cat.toUpperCase()}</span>`:'';
  return`<div class="ex-card ${done?'done':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
      <div class="ex-name">${defEx.lbl}</div>${catBadge}
    </div>
    <div class="ex-target">Target: ${e.s}×${tMn===tMx?tMn:`${tMn}–${tMx}`} ${defEx.u}${note?` · ${note}`:''}</div>
    <div class="sets-row">${e.logged.map((val,si)=>`
      <div class="set-input-wrap">
        <span class="set-num">Set ${si+1}</span>
        <input type="number" class="set-input ${ccls(val,tMn)}" value="${val!==null?val:''}" min="0" max="99"
          onchange="logSet('${e.id}',${si},this.value)" oninput="colorSet(this,${tMn})" placeholder="${tMn}">
      </div>`).join('')}
    </div>
  </div>`;
}

function ccls(val,tMn){if(val===null||val==='')return'';const n=parseInt(val);return isNaN(n)?'':n>=tMn?'good':n>=tMn*.8?'warn':'bad';}

          <div><div class="plan-ex-name">${e.lbl}</div>${e.note?`<div class="plan-ex-note">${e.note}</div>`:''}</div>
          <div class="plan-ex-target">${e.s}×${e.mn===e.mx?e.mn:`${e.mn}–${e.mx}`} ${e.u}</div>
        </div>`).join('')}`:''}
        <div class="plan-section-label">Warm-up &amp; cool-down</div>
        <div style="font-size:12px;color:var(--muted);padding:4px 0">Single checkbox each — you manage the details.</div>
      </div>
    </div>`;
  }).join('')}`;
}

function renderHist(){
  const sorted=[...ST.sessions].filter(s=>s.completed).sort((a,b)=>(b.completedAt||b.date).localeCompare(a.completedAt||a.date));
  if(!sorted.length)return`<div class="empty"><div class="big">○</div>No sessions yet.</div>`;
  return`<div class="section-label">All sessions (${sorted.length})</div>`+sorted.map(s=>{
    const isExp=ST.xhist===s.id;
    const exArr=s.ex||s.exercises||[];
    return`<div class="hist-item" onclick="togHist('${s.id}')">
      <div class="hi-head"><div class="hi-name">${s.name}</div><div class="hi-date">${fmtDate(s.date)}</div></div>
      <div class="hi-sets">${exArr.length} exercises <span class="badge badge-${s.type}" style="margin-left:6px">${s.type}</span><span style="color:var(--muted);float:right">${isExp?'▲':'▼'}</span></div>
    </div>
    <div class="hist-expand ${isExp?'open':''}">
      ${isExp?exArr.map(e=>{const v=(e.logged||[]).filter(v=>v!==null);return`<div class="hist-ex-row"><span class="hn">${e.lbl||e.label||e.id}</span><span class="hv">${v.join(' / ')||'—'}</span></div>`;}).join(''):''}
      ${isExp&&s.aiAssessment?`<div style="margin-top:8px;padding:8px;background:var(--pull-d);border-radius:6px;font-size:11px;color:var(--pull-l)">AI Score: ${s.aiAssessment.score}/10 — ${s.aiAssessment.verdict}</div>`:''}
    </div>`;
  }).join('');
}

function renderProg(){
  const track=['wide_pullup','dips','pike_push','lat_raise','pseudo_planche','sa_row','straight_pulldown','bulgarian','sl_rdl','nordic','pistol','incline_ring_push'];
  const labels={
    wide_pullup:'Wide Pullups',dips:'Ring Dips',pike_push:'Pike Pushups',
    lat_raise:'Lateral Raises',pseudo_planche:'Pseudo Planche',sa_row:'SA Ring Row',
    straight_pulldown:'Straight-Arm PD',bulgarian:'Bulgarian Squat',
    sl_rdl:'SL Romanian DL',nordic:'Nordic Curl',pistol:'Pistol Squat',
    incline_ring_push:'Incline Ring Push'
  };
  const getH=(id)=>{
    const h=[];
    ST.sessions.filter(s=>s.completed).sort((a,b)=>a.date.localeCompare(b.date)).forEach(s=>{
      const exArr=s.ex||s.exercises||[];
      const ex=exArr.find(e=>e.id===id);
      if(ex){const v=(ex.logged||[]).filter(v=>v!==null);if(v.length)h.push({date:s.date,max:Math.max(...v.map(Number))});}
    });
    return h.slice(-8);
  };
  const bars=(hist)=>{
    if(!hist.length)return'<div style="color:var(--muted);font-size:12px;padding:8px 0">No data yet</div>';
    const mx=Math.max(...hist.map(h=>h.max));
    return`<div class="prog-bars">${hist.map((h,i)=>{
      const barH=Math.max(4,Math.round((mx>0?h.max/mx:0)*44));
      const up=i>0&&h.max>hist[i-1].max;
      return`<div class="prog-bar-col">
        <div class="prog-bar-val">${h.max}</div>
        <div class="prog-bar-bg" style="height:${barH}px;background:${up?'var(--good)':'var(--accent)'}"></div>
        <div class="prog-bar-date">${h.date.slice(5)}</div>
      </div>`;
    }).join('')}</div>`;
  };
  const cards=track.map(id=>{
    const hist=getH(id);if(!hist.length)return'';
    const lt=hist.slice(-2);
    const imp=lt.length===2&&lt[1].max>lt[0].max;
    const sta=lt.length===2&&lt[1].max===lt[0].max;
    return`<div class="prog-ex">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="prog-ex-name">${labels[id]||id}</div>
        <span class="badge ${imp?'badge-good':sta?'badge-warn':'badge-main'}">${imp?'▲ GROWING':sta?'→ STALLED':'↓ WATCH'}</span>
      </div>${bars(hist)}</div>`;
  }).filter(Boolean);
  return`<div class="section-label">Exercise trends</div>${cards.length?cards.join(''):'<div class="empty"><div class="big">○</div>Complete sessions to see trends.</div>'}`;
}

function renderProtein(){
  const t=today();
  const entries=getEntries(t);
  const total=sumEntries(entries);
  const pct=Math.min(100,Math.round(total/160*100));
  const col=total>=140?'var(--good)':total>=100?'var(--warn)':'var(--bad)';
  const hist=Object.entries(ST.protein).filter(([d])=>d!==t).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([d,v])=>({d,g:Array.isArray(v)?v.reduce((s,e)=>s+(e.g||0),0):typeof v==='number'?v:0}));
  return`<div class="section-label">Protein tracker — target 160g/day</div>
  <div class="protein-hero">
    <div class="protein-today"><span class="pval" style="color:${col}">${total}</span><span class="ptgt">/ 160g today</span></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${total>=160?'✓ Target reached':Math.max(0,160-total)+'g remaining'}</div>
    <div class="protein-bar-wrap"><div class="protein-bar" style="width:${pct}%;background:${col}"></div></div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px">Min for muscle growth at 40+: 128g · Optimal: 160g</div>
  </div>
  <div class="section-label">Add entry</div>
  <div class="p-input-row">
    <input type="number" id="p-g" placeholder="g" min="1" max="300">
    <input type="text" id="p-src" placeholder="Source e.g. chicken, whey...">
    <button class="btn btn-secondary btn-sm" onclick="logP()">ADD</button>
  </div>
  <div class="section-label">Quick add</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
    ${[[24,'Eggs ×4'],[25,'Whey shake'],[46,'Chicken 200g'],[22,'Greek yoghurt'],[18,'Lentils 100g'],[15,'Tuna 70g'],[16,'Ful medammes']].map(([g,l])=>`<button class="btn btn-secondary btn-sm" onclick="quickP(${g},'${l}')">+${g}g <span style="color:var(--muted);font-size:10px">${l}</span></button>`).join('')}
  </div>
  <div class="section-label">Today's log</div>
  ${entries.length?`<div class="protein-entry-list">${entries.map((e,i)=>`
    <div class="protein-entry">
      <span class="pe-time">${e.t||''}</span>
      <span class="pe-src">${e.src||'Entry'}</span>
      <span class="pe-g">+${e.g}g</span>
      <button class="pe-del" onclick="delP(${i})">✕</button>
    </div>`).join('')}</div>
  <div style="font-size:12px;color:var(--muted);text-align:right;margin-bottom:4px">Total: <span class="mono" style="color:${col};font-weight:600">${total}g</span></div>`
  :'<div style="color:var(--muted);font-size:12px;margin-bottom:12px">No entries yet — log above or use quick add</div>'}
  <div class="section-label">Previous days</div>
  ${hist.length?hist.map(({d,g})=>`<div class="protein-hist-row"><span class="pdate">${fmtDate(d)}</span><span class="pamount" style="color:${g>=140?'var(--good)':g>=100?'var(--warn)':'var(--bad)'}">${g}g ${g>=140?'✓':g>=100?'≈':'✗'}</span></div>`).join(''):'<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">No history</div>'}`;
}

// ─── ACTIONS ─────────────────────────────────────────────
function startSess(){
  const def=SESS[ST.ci%6];
  ST.active={id:`s_${Date.now()}`,defId:def.id,name:def.name,type:def.type,date:today(),startedAt:new Date().toISOString(),wuDone:false,cdDone:false,ex:def.ex.map(e=>({...e,logged:Array(e.s).fill(null)}))};
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='train'));
  render();
}

function logSet(exId,si,val){
  if(!ST.active)return;
  const ex=ST.active.ex.find(e=>e.id===exId);
  if(ex)ex.logged[si]=val===''?null:parseInt(val);
  const total=ST.active.ex.reduce((s,e)=>s+e.s,0);
  const done=ST.active.ex.reduce((s,e)=>s+e.logged.filter(v=>v!==null).length,0);
  const pct=Math.round(done/total*100);
  const pb=document.getElementById('prog-bar');if(pb)pb.style.width=pct+'%';
  const sc=document.getElementById('set-counter');if(sc)sc.textContent=`${done}/${total} sets`;
}

function colorSet(inp,tMn){
  const n=parseInt(inp.value);
  inp.className='set-input'+(isNaN(n)||inp.value===''?'':n>=tMn?' good':n>=tMn*.8?' warn':' bad');
}

function togWu(){if(!ST.active)return;ST.active.wuDone=!ST.active.wuDone;render();}
function togCd(){if(!ST.active)return;ST.active.cdDone=!ST.active.cdDone;render();}
function togHist(id){ST.xhist=ST.xhist===id?null:id;render();}
function togPlan(id){ST.xplan=ST.xplan===id?null:id;render();}
function abandon(){if(confirm('Abandon session?')){ST.active=null;render();}}

async function finish(){
  if(!ST.active)return;
  const s=ST.active;
  s.completed=true;s.completedAt=new Date().toISOString();
  ST.ci=(ST.ci+1)%6;
  await DB.set('pp_ci',ST.ci);
  ST.sessions.push({id:s.id,defId:s.defId,name:s.name,type:s.type,date:s.date,completedAt:s.completedAt,completed:true,ex:s.ex.map(e=>({id:e.id,lbl:e.lbl,s:e.s,mn:e.mn,mx:e.mx,u:e.u,cat:e.cat,logged:e.logged}))});
  await DB.set('pp_s',ST.sessions);
  ST.active=null;ST.view='dashboard';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='dashboard'));
  render();
  aiAssess(s);
}

// Protein helpers
function getEntries(d){const v=ST.protein[d];if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='number')return[{g:v,src:'Legacy',t:''}];return[];}
function sumEntries(ents){return ents.reduce((s,e)=>s+(e.g||0),0);}

function logP(){
  const g=parseInt(document.getElementById('p-g').value);
  if(isNaN(g)||g<=0)return;
  const src=document.getElementById('p-src').value.trim()||'Manual';
  pushEntry(g,src);
  document.getElementById('p-g').value='';
  document.getElementById('p-src').value='';
}
function quickP(g,src){pushEntry(g,src);}
function pushEntry(g,src){
  const d=today();
  if(!Array.isArray(ST.protein[d]))ST.protein[d]=[];
  ST.protein[d].push({g,src,t:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});
  DB.set('pp_p',ST.protein);render();
}
function delP(i){
  const d=today();
  if(!Array.isArray(ST.protein[d]))return;
  ST.protein[d].splice(i,1);
  DB.set('pp_p',ST.protein);render();
}
function getTodayG(){return sumEntries(getEntries(today()));}

// ─── AI ASSESSMENT ────────────────────────────────────────
async function aiAssess(session){
  const def=SESS.find(x=>x.id===session.defId);if(!def)return;
  const prev=ST.sessions.filter(s=>s.completed&&s.defId===session.defId&&s.id!==session.id).slice(-3);
  const exRep=session.ex.map(e=>{const l=e.logged.filter(v=>v!==null);return l.length?`${e.lbl}: ${l.join('/')} (Target: ${e.s}×${e.mn}–${e.mx} ${e.u})`:null;}).filter(Boolean).join('\n');
  const prevRep=prev.length?prev.map(s=>`${s.date}: ${(s.ex||[]).map(e=>{const v=(e.logged||[]).filter(v=>v!==null);return v.length?`${e.lbl}: ${v.join('/')}`:null;}).filter(Boolean).join(', ')}`).join('\n'):'No previous sessions of this type';
  const prompt=`You are an expert calisthenics coach. Bakr is a 40+ year old male (80kg) training for V-taper physique. Known left-side pulling weakness — SA Ring Rows always lead with left. Neck tension history. Protein target 160g/day. Training 5-6 days/week in a push/pull 6-session cycle, 42-min cap per session.

SESSION: ${session.name} (${session.defId})
DATE: ${session.date}

LOGGED:
${exRep}

PREVIOUS SESSIONS (same type):
${prevRep}

Set adjusted targets for the NEXT occurrence of ${session.name}. Be precise and honest — do not inflate targets. Reply ONLY with valid JSON, no markdown:
{"score":<1-10>,"verdict":"<one sharp sentence>","highlights":["<1-2 positives>"],"flags":["<1-2 issues or left-side notes>"],"next_targets":{"<exercise_id>":{"sets":<n>,"min":<n>,"max":<n>,"note":"<short cue>"}},"coaching_note":"<2-3 honest sentences — mention V-taper priorities if relevant>"}

Only include exercises with logged data. Available IDs: ${session.ex.map(e=>e.id).join(', ')}.`;

  try{
    const isLocal=window.location.hostname==='localhost'||window.location.hostname==='';
    const url=isLocal?'https://api.anthropic.com/v1/messages':'/.netlify/functions/ai-assess';
    const hdrs={'Content-Type':'application/json'};
    if(isLocal)hdrs['anthropic-version']='2023-06-01';
    const res=await fetch(url,{method:'POST',headers:hdrs,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'';
    const assessment=JSON.parse(text.replace(/```json|```/g,'').trim());
    ST.recs[session.defId]=assessment;
    await DB.set('pp_r',ST.recs);
    const saved=ST.sessions.find(s=>s.id===session.id);
    if(saved)saved.aiAssessment=assessment;
    await DB.set('pp_s',ST.sessions);
    showToast(`AI: ${assessment.score}/10 — ${assessment.verdict}`);
    if(ST.view==='dashboard')render();
  }catch(e){console.warn('AI failed:',e);showToast('Session saved');}
}

// ─── DATA MANAGEMENT ─────────────────────────────────────
function renderData(){
  const done=ST.sessions.filter(s=>s.completed).length;
  const proteinDays=Object.keys(ST.protein).length;
  const firstDate=ST.sessions.length?[...ST.sessions].sort((a,b)=>a.date.localeCompare(b.date))[0].date:'—';
  const lastDate=ST.sessions.filter(s=>s.completed).length?[...ST.sessions].filter(s=>s.completed).sort((a,b)=>b.date.localeCompare(a.date))[0].date:'—';
  return`<div class="section-label">Data management</div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-family:var(--font-d);font-size:15px;font-weight:600;margin-bottom:12px;letter-spacing:.3px">Stored data summary</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      <div style="background:var(--s3);border-radius:6px;padding:10px 12px">
        <div class="mono" style="font-size:22px;font-weight:600">${done}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Completed sessions</div>
      </div>
      <div style="background:var(--s3);border-radius:6px;padding:10px 12px">
        <div class="mono" style="font-size:22px;font-weight:600">${proteinDays}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Protein log days</div>
      </div>
      <div style="background:var(--s3);border-radius:6px;padding:10px 12px">
        <div class="mono" style="font-size:13px;font-weight:600">${fmtDate(firstDate)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">First session</div>
      </div>
      <div style="background:var(--s3);border-radius:6px;padding:10px 12px">
        <div class="mono" style="font-size:13px;font-weight:600">${fmtDate(lastDate)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Last session</div>
      </div>
    </div>
  </div>

  <div class="section-label">Export</div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.6">Downloads all sessions, protein log, AI recommendations, and cycle position as a single JSON file.</div>
    <button class="btn btn-secondary" style="width:100%;margin-bottom:8px" onclick="exportData()">↓ Export all data</button>
    <div style="font-size:11px;color:var(--muted)">File: pushpull_backup_${today()}.json</div>
  </div>

  <div class="section-label">Import</div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;color:var(--sub);margin-bottom:4px;line-height:1.6">Restores data from a previously exported file.</div>
    <div style="font-size:12px;color:var(--warn);margin-bottom:12px;padding:8px 10px;background:#451a03;border-radius:6px;line-height:1.5">⚠ Import merges sessions by date. Existing entries for the same date are not overwritten.</div>
    <button class="btn btn-secondary" style="width:100%" onclick="document.getElementById('import-file').click()">↑ Import from file</button>
  </div>

  <div class="section-label">Reset</div>
  <div class="card">
    <div style="font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.6">Clears all stored data permanently. Export first if you want a backup.</div>
    <button class="btn btn-danger btn-sm" style="width:100%" onclick="resetAll()">✕ Clear all data</button>
  </div>`;
}

function exportData(){
  const payload={
    exportVersion:'pp_v7',
    exportDate:today(),
    exportTime:new Date().toISOString(),
    cycleIndex:ST.ci,
    sessions:ST.sessions,
    protein:ST.protein,
    recs:ST.recs,
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`pushpull_backup_${today()}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Data exported successfully');
}

async function handleImport(evt){
  const file=evt.target.files[0];if(!file)return;
  evt.target.value='';
  let raw;
  try{raw=await file.text();}catch{showToast('Could not read file');return;}
  let parsed;
  try{parsed=JSON.parse(raw);}catch{showToast('Invalid JSON file');return;}
  if(parsed.exportVersion==='pp_v7'){await importV7(parsed);}
  else{showToast('Unrecognised file format');return;}
}

async function importV7(data){
  let merged=0,skipped=0;
  const existingIds=new Set(ST.sessions.map(s=>s.id));
  const existingDates=new Set(ST.sessions.map(s=>s.date));
  (data.sessions||[]).forEach(s=>{
    if(existingIds.has(s.id)){skipped++;return;}
    if(existingDates.has(s.date)&&ST.sessions.find(x=>x.date===s.date&&x.defId===s.defId)){skipped++;return;}
    ST.sessions.push(s);merged++;
  });
  Object.entries(data.protein||{}).forEach(([d,v])=>{
    const incoming=Array.isArray(v)?v:typeof v==='number'?[{g:v,src:'Import',t:''}]:[];
    if(!ST.protein[d]){ST.protein[d]=incoming;}
    else{
      const existing=Array.isArray(ST.protein[d])?ST.protein[d]:[];
      incoming.forEach(e=>{
        const dup=existing.find(x=>x.g===e.g&&x.src===e.src&&x.t===e.t);
        if(!dup)existing.push(e);
      });
      ST.protein[d]=existing;
    }
  });
  if(data.recs&&Object.keys(data.recs).length)ST.recs={...data.recs,...ST.recs};
  await DB.set('pp_s',ST.sessions);
  await DB.set('pp_p',ST.protein);
  await DB.set('pp_r',ST.recs);
  showToast(`Imported ${merged} sessions, ${skipped} skipped`);
  render();
}

async function resetAll(){
  if(!confirm('Clear ALL data permanently? This cannot be undone.'))return;
  if(!confirm('Are you sure? Export first if you want a backup.'))return;
  ST.sessions=[];ST.protein={};ST.recs={};ST.ci=3;
  await DB.set('pp_s',[]);await DB.set('pp_p',{});await DB.set('pp_r',{});await DB.set('pp_ci',3);await DB.set('pp_imp',false);
  showToast('All data cleared');render();
}

// ─── UTILS ────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}catch{return d}}
function calcStreak(){
  const dates=[...new Set(ST.sessions.filter(s=>s.completed).map(s=>s.date))].sort().reverse();
  if(!dates.length)return 0;
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  for(const d of dates){const dd=new Date(d+'T12:00:00');dd.setHours(0,0,0,0);const diff=Math.round((cur-dd)/86400000);if(diff<=1){streak++;cur=dd;}else break;}
  return streak;
}
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--border2);color:var(--text);font-size:12px;padding:8px 16px;border-radius:20px;z-index:999;font-family:var(--font-b);transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',3500);
}
